<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" style="background: #16a34a">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#grad1)"/>
  
  <!-- Agriculture symbol -->
  <g transform="translate(256,256)">
    <!-- Wheat stalks -->
    <g stroke="#ffffff" stroke-width="4" fill="#ffffff">
      <!-- Left stalk -->
      <path d="M-80,-100 L-80,80" stroke-width="6"/>
      <ellipse cx="-88" cy="-80" rx="8" ry="4"/>
      <ellipse cx="-72" cy="-70" rx="8" ry="4"/>
      <ellipse cx="-88" cy="-60" rx="8" ry="4"/>
      <ellipse cx="-72" cy="-50" rx="8" ry="4"/>
      <ellipse cx="-88" cy="-40" rx="8" ry="4"/>
      <ellipse cx="-72" cy="-30" rx="8" ry="4"/>
      
      <!-- Center stalk -->
      <path d="M0,-120 L0,80" stroke-width="8"/>
      <ellipse cx="-8" cy="-100" rx="10" ry="5"/>
      <ellipse cx="8" cy="-90" rx="10" ry="5"/>
      <ellipse cx="-8" cy="-80" rx="10" ry="5"/>
      <ellipse cx="8" cy="-70" rx="10" ry="5"/>
      <ellipse cx="-8" cy="-60" rx="10" ry="5"/>
      <ellipse cx="8" cy="-50" rx="10" ry="5"/>
      <ellipse cx="-8" cy="-40" rx="10" ry="5"/>
      <ellipse cx="8" cy="-30" rx="10" ry="5"/>
      
      <!-- Right stalk -->
      <path d="M80,-100 L80,80" stroke-width="6"/>
      <ellipse cx="72" cy="-80" rx="8" ry="4"/>
      <ellipse cx="88" cy="-70" rx="8" ry="4"/>
      <ellipse cx="72" cy="-60" rx="8" ry="4"/>
      <ellipse cx="88" cy="-50" rx="8" ry="4"/>
      <ellipse cx="72" cy="-40" rx="8" ry="4"/>
      <ellipse cx="88" cy="-30" rx="8" ry="4"/>
    </g>
    
    <!-- Sun -->
    <circle cx="-120" cy="-120" r="30" fill="#fbbf24" stroke="#f59e0b" stroke-width="3"/>
    <g stroke="#fbbf24" stroke-width="3">
      <path d="M-120,-160 L-120,-150"/>
      <path d="M-85,-155 L-91,-149"/>
      <path d="M-80,-120 L-90,-120"/>
      <path d="M-85,-85 L-91,-91"/>
      <path d="M-120,-80 L-120,-90"/>
      <path d="M-155,-85 L-149,-91"/>
      <path d="M-160,-120 L-150,-120"/>
      <path d="M-155,-155 L-149,-149"/>
    </g>
    
    <!-- Ground line -->
    <path d="M-200,80 L200,80" stroke="#8b5cf6" stroke-width="6" fill="none"/>
  </g>
  
  <!-- App title -->
  <text x="256" y="450" text-anchor="middle" fill="#ffffff" font-size="36" font-weight="bold" font-family="Arial, sans-serif">Smart Krishi</text>
</svg>