<!DOCTYPE html>
<html>
<head>
    <title>Icon Generator</title>
</head>
<body>
    <canvas id="canvas" width="512" height="512" style="border: 1px solid #ccc;"></canvas>
    <br><br>
    <button onclick="downloadIcon(48)">Download 48x48</button>
    <button onclick="downloadIcon(72)">Download 72x72</button>
    <button onclick="downloadIcon(96)">Download 96x96</button>
    <button onclick="downloadIcon(144)">Download 144x144</button>
    <button onclick="downloadIcon(192)">Download 192x192</button>
    <button onclick="downloadIcon(512)">Download 512x512</button>

    <script>
        function createIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Green background
            ctx.fillStyle = '#16a34a';
            ctx.fillRect(0, 0, size, size);
            
            // White circle background
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size * 0.35;
            
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.fill();
            
            // Draw sprout/leaf icon
            ctx.fillStyle = '#16a34a';
            ctx.strokeStyle = '#16a34a';
            ctx.lineWidth = size * 0.02;
            
            // Stem
            const stemWidth = size * 0.03;
            const stemHeight = size * 0.3;
            ctx.fillRect(centerX - stemWidth/2, centerY + radius*0.2, stemWidth, stemHeight);
            
            // Leaves
            ctx.beginPath();
            // Left leaf
            ctx.ellipse(centerX - radius*0.3, centerY - radius*0.2, radius*0.25, radius*0.4, -Math.PI/6, 0, 2 * Math.PI);
            ctx.fill();
            
            // Right leaf
            ctx.beginPath();
            ctx.ellipse(centerX + radius*0.3, centerY - radius*0.2, radius*0.25, radius*0.4, Math.PI/6, 0, 2 * Math.PI);
            ctx.fill();
            
            return canvas;
        }
        
        function downloadIcon(size) {
            const canvas = createIcon(size);
            const link = document.createElement('a');
            link.download = `icon-${size}x${size}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }
        
        // Draw initial icon for preview
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const previewCanvas = createIcon(512);
        ctx.drawImage(previewCanvas, 0, 0);
    </script>
</body>
</html>
