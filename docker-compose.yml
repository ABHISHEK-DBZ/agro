version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: krishi-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: smart-krishi-sahayak
    volumes:
      - mongodb_data:/data/db
    networks:
      - krishi-network

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: krishi-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/smart-krishi-sahayak?authSource=admin
      - JWT_SECRET=your-super-secret-jwt-key-for-production
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - mongodb
    networks:
      - krishi-network

  # Frontend Service  
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: krishi-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
      - VITE_GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - backend
    networks:
      - krishi-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: krishi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - krishi-network

volumes:
  mongodb_data:

networks:
  krishi-network:
    driver: bridge