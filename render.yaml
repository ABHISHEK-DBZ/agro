services:
  # Smart Krishi Sahayak Backend API
  - type: web
    name: smart-krishi-sahayak-api
    runtime: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: VITE_GEMINI_API_KEY
        sync: false
    healthCheckPath: /api/health

  # Smart Krishi Sahayak Frontend - React App
  - type: web
    name: smart-krishi-sahayak
    runtime: static
    buildCommand: npm install && npm run build
    publishPath: ./dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_BASE_URL
        value: https://smart-krishi-sahayak-api.onrender.com
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_OPENWEATHER_API_KEY
        sync: false
      - key: VITE_GEMINI_API_KEY
        sync: false

databases:
  - name: smart-krishi-sahayak-db
    databaseName: smart_krishi_sahayak
    plan: free