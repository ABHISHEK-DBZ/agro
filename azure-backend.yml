# Azure App Service deployment configuration for Node.js backend

runtime:
  name: node
  version: '20'

build:
  commands:
    - cd server
    - npm install
    - npm run build

deploy:
  path: server
  startup:
    command: node index.js

env:
  NODE_ENV: production
  PORT: 8080

scaling:
  min_instances: 1
  max_instances: 3

healthcheck:
  path: /api/health
  interval: 30s
  timeout: 5s
