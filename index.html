<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./icons/app-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Smart Krishi Sahayak is a modern web application for farmers in India, providing weather forecasts, crop information, disease detection, market prices, and details on government schemes." />
    <meta name="keywords" content="agriculture, farming, india, krishi, sahayak, farmers, crop, weather, mandi prices, government schemes, plant disease" />
    <title>Smart Krishi Sahayak - Agriculture Assistant</title>
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#39542f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Krishi Sahayak">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/180/wheat.png">
    
    <script>
      // Single Page Apps for GitHub Pages routing
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))

      // FOUC prevention: apply theme/font-size from localStorage before React mounts.
      // This avoids the visible "flash" when the saved theme is dark but the page first
      // renders in light mode.
      (function() {
        try {
          var saved = JSON.parse(localStorage.getItem('settings:appearance') || 'null');
          if (saved) {
            if (saved.theme === 'dark' ||
                (saved.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
              document.documentElement.classList.add('dark');
            } else {
              document.documentElement.classList.remove('dark');
            }
            if (saved.fontSize === 'small') {
              document.documentElement.style.fontSize = '14px';
            } else if (saved.fontSize === 'large') {
              document.documentElement.style.fontSize = '18px';
            } else {
              document.documentElement.style.fontSize = '16px';
            }
            document.documentElement.setAttribute('lang', saved.language || 'hi');
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div id="loading-screen" style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; font-family: Arial, sans-serif; background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f0fdf4 100%); position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10000;">
        <div style="text-align: center;">
          <h1 style="color: #16a34a; margin-bottom: 15px; font-size: 2rem;">🌾 Smart Krishi Sahayak</h1>
          <p style="color: #6b7280; margin-bottom: 25px; font-size: 1.1rem;">Loading agriculture application...</p>
          <div style="width: 50px; height: 50px; border: 4px solid #e5e7eb; border-top: 4px solid #16a34a; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
        </div>
      </div>
      <style>
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        html, body { 
          margin: 0; 
          padding: 0; 
          width: 100%;
          height: 100%;
          overflow: hidden;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }
        #root {
          width: 100vw;
          height: 100vh;
          position: relative;
          overflow: hidden;
        }
        /* Prevent scrollbars during loading */
        body.loading {
          overflow: hidden !important;
        }
      </style>
    </div>
    <!-- Vite will inject the React app script during build -->
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // Add loading class to body
      document.body.classList.add('loading');
      
      // Remove loading class when app loads
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.style.opacity = '0';
            loadingScreen.style.transition = 'opacity 0.5s ease-out';
            setTimeout(function() {
              loadingScreen.style.display = 'none';
              document.body.classList.remove('loading');
              document.body.style.overflow = 'auto';
            }, 500);
          }
        }, 1000);
      });
      
      // Register Service Worker for PWA offline support (disabled on localhost for active development)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
          if (isLocalhost) {
            console.log('🚧 Service Worker disabled on localhost for real-time development HMR');
            // Unregister existing service workers to clear cache immediately
            navigator.serviceWorker.getRegistrations().then(registrations => {
              for (let registration of registrations) {
                registration.unregister();
                console.log('🗑️ Unregistered old local Service Worker.');
              }
            });
            return;
          }
          
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('✅ Service Worker registered successfully:', registration.scope);
              
              // Check for updates
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                console.log('🔄 New Service Worker found, installing...');
                
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    console.log('✨ New content available! Please refresh.');
                    // Optionally show notification to user
                    if (confirm('New version available! Reload to update?')) {
                      window.location.reload();
                    }
                  }
                });
              });
            })
            .catch(error => {
              console.error('❌ Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
